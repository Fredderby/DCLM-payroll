<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}DCLM Payroll Management System{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="/static/css/style.css" rel="stylesheet" />
  <link href="/static/css/progress.css" rel="stylesheet" />
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="orb-decoration orb-1"></div>
  <div class="orb-decoration orb-2"></div>
  <div class="orb-decoration orb-3"></div>
  <div class="app-wrapper">
    {% include "partials/navigation.html" %}
    <div class="main-content" id="main-content">
      {% block content %}
      {% endblock %}
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/menu-tabs.js"></script>
  <script src="/static/js/toast-notifications.js"></script>
  <script src="/static/js/progress-system.js"></script>
  <script src="/static/js/spa-navigation.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
